name: Daily Meaningful PR

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-daily-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          pip install black flake8 isort safety requests
          npm install -g prettier eslint

      - name: Run code improvements
        run: python scripts/generate-pr-changes.py
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.email "action@github.com"
          git config user.name "Daily PR Bot"
          git add -A
          git commit -m "chore: daily code improvements"
          git push

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: daily-pr-improvements
          title: "Daily PR: Code improvements"
          body: "Automated daily improvements generated by Jules Daily PR Bot"
          labels: "automated,daily-maintenance"

name: Daily Meaningful PR

on:
  schedule:
    # Runs at 9 AM UTC daily (adjust time as needed)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  create-daily-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: |
          pip install black flake8 isort safety requests

      - name: Install Node.js dependencies
        run: |
          npm install -g prettier eslint

      - name: Run code improvements
        shell: bash
        run: python scripts/generate-pr-changes.py
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Daily PR Bot"
          git add -A
          git commit -m "chore: daily code improvements and maintenance

- Code formatting (Black, Prettier)
- Linting fixes
- Security improvements
- Documentation updates
- Dependencies audit

Generated by Jules Daily PR Bot"

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: daily code improvements"
          title: "🤖 Daily PR: Code improvements and maintenance"
          body: |
            ## Daily Automated Improvements

            This PR includes meaningful code improvements generated daily:

            - ✨ Code formatting (Black for Python, Prettier for JavaScript)
            - 🔍 Linting fixes (flake8, ESLint)
            - 🛡️ Security audit improvements
            - 📚 Documentation enhancements
            - 🔄 Dependency health checks

            Generated by Jules Daily PR Bot
          branch: daily-pr-${{ github.run_number }}
          delete-branch: true
          labels: "automated,daily-maintenance"

name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys concurrently — the VM-side script also takes a flock,
# this just avoids piling up redundant runs in the Actions queue.
concurrency:
  group: deploy-to-vm
  cancel-in-progress: false

jobs:
  # Fail fast on GitHub's runner, before ever touching the production VM. If
  # this job fails, the deploy job below never starts and the live server is
  # untouched.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install + build
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build
          test -f dist/index.html

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend install (mirrors backend/install.ps1 for Linux)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --no-deps fyers-apiv3==3.1.14
          pip install "aiohttp>=3.10" websocket-client aws-lambda-powertools "setuptools<81"
          pip install pytest

      - name: Backend import check
        working-directory: backend
        run: |
          python -c "import app.main; from fyers_apiv3 import fyersModel; from fyers_apiv3.FyersWebsocket import data_ws; print('OK: backend + fyers-apiv3 import cleanly')"

      - name: Backend unit tests
        working-directory: backend
        run: python -m pytest tests/ -q

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/ubuntu/app
            echo "==> syncing repo (deploy/deploy.sh must be the freshly-pulled version before we run it)"
            git fetch origin main
            git reset --hard origin/main
            bash deploy/deploy.sh
